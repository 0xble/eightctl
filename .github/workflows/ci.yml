name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check (gofumpt)
        run: |
          CHANGED=$(go tool mvdan.cc/gofumpt -l .)
          if [ -n "$CHANGED" ]; then
            echo "gofumpt would reformat:" >&2
            echo "$CHANGED" >&2
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.10.1

      - name: Test
        run: go test ./...

      - name: Coverage
        run: |
          go test \
            -coverpkg=./internal/client,./internal/config,./internal/daemon,./internal/output,./internal/tokencache \
            ./internal/client ./internal/config ./internal/daemon ./internal/output ./internal/tokencache \
            -coverprofile=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          echo "core coverage: ${COVERAGE}%"
          awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 85.0) }'
